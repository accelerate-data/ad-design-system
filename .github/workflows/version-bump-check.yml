name: Version Bump Check

on:
  pull_request:
    paths:
      - "plugin/**"

permissions:
  contents: read

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: git fetch origin main

      - name: Check manifest versions
        shell: bash
        run: |
          set -euo pipefail

          CLAUDE_PR=$(jq -r '.version' plugin/.claude-plugin/plugin.json)
          CODEX_PR=$(jq -r '.version' plugin/.codex-plugin/plugin.json)
          MAIN=$(
            git show origin/main:plugin/.claude-plugin/plugin.json \
              2>/dev/null | jq -r '.version // empty' || true
          )

          if [ -z "$CLAUDE_PR" ] || [ -z "$CODEX_PR" ]; then
            echo "Both plugin manifests must include a version."
            exit 1
          fi

          if [ "$CLAUDE_PR" != "$CODEX_PR" ]; then
            echo "Plugin manifest versions must match."
            echo "Claude manifest: $CLAUDE_PR"
            echo "Codex manifest: $CODEX_PR"
            exit 1
          fi

          if [ -z "$MAIN" ]; then
            echo "No main-branch plugin version found; skipping bump comparison."
            exit 0
          fi

          if [ "$(printf '%s\n%s\n' "$MAIN" "$CLAUDE_PR" | sort -V | tail -n1)" != "$CLAUDE_PR" ] ||
             [ "$MAIN" = "$CLAUDE_PR" ]; then
            echo "Plugin manifest version was not bumped or was downgraded."
            echo "origin/main: $MAIN"
            echo "pull request: $CLAUDE_PR"
            exit 1
          fi

          echo "Version bumped: $MAIN -> $CLAUDE_PR"
