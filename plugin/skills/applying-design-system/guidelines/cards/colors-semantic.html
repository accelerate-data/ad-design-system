<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Success uses Seafoam; warning/error/info for state" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 88px; }
  .meta { padding: 10px 12px; background: var(--bg-raised); }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="meta"><div class="name">Success</div><div class="hex">#00dd92</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="meta"><div class="name">Warning</div><div class="hex">#f59e0b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--error)"></div><div class="meta"><div class="name">Error</div><div class="hex">#ef4444</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="meta"><div class="name">Info</div><div class="hex">#00b4d8</div></div></div>
  </div>
</body>
</html>
