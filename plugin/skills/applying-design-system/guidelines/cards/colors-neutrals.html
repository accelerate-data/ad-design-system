<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Pearl & Smoke anchor the light and dark surfaces" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .chip { height: 88px; }
  .meta { padding: 10px 12px; background: var(--bg-raised); }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .role { display: inline-block; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pearl)"></div><div class="meta"><div class="name">Pearl</div><div class="hex">#f2f2f2</div><div class="role">Light BG</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--smoke)"></div><div class="meta"><div class="name">Smoke</div><div class="hex">#171c21</div><div class="role">Dark BG</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-200)"></div><div class="meta"><div class="name">Border</div><div class="hex">#d8dee5</div><div class="role">Hairlines</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--gray-500)"></div><div class="meta"><div class="name">Muted</div><div class="hex">#6b7280</div><div class="role">Text muted</div></div></div>
  </div>
</body>
</html>
