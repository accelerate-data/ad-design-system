<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; height: 96px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .dot { width: 22px; height: 22px; border-radius: var(--radius-full); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--pacific-soft)"><span class="dot" style="background:var(--pacific)"></span><span class="name">--pacific-soft</span></div>
    <div class="sw" style="background:var(--seafoam-soft)"><span class="dot" style="background:var(--seafoam)"></span><span class="name">--seafoam-soft</span></div>
    <div class="sw" style="background:var(--warning-soft)"><span class="dot" style="background:var(--warning)"></span><span class="name">--warning-soft</span></div>
    <div class="sw" style="background:var(--error-soft)"><span class="dot" style="background:var(--error)"></span><span class="name">--error-soft</span></div>
  </div>
</body>
</html>
