<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4px grid — space-1 (4) through space-12 (48)" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-base); padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--pacific); border-radius: 2px; width: 28px; }
  .n { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="n">1·4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="n">2·8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="n">3·12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="n">4·16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="n">6·24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="n">8·32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="n">12·48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="n">16·64</div></div>
  </div>
</body>
</html>
