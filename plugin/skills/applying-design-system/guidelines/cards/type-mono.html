<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--bg-base); padding: 24px; color: var(--text-primary); }
  .big { font-size: 28px; font-weight: 600; color: var(--pacific); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .rows { margin-top: 14px; display: grid; gap: 6px; font-size: 13px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .k { color: var(--text-muted); }
</style>
</head>
<body>

  </div>
</body>
</html>
