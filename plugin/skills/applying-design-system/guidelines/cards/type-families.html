<!-- @dsCard group="Type" viewport="700x190" name="Font Families" subtitle="Geist (sans) for UI · Geist Mono for data" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 24px; color: var(--text-primary); display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
  .glyphs { font-size: 34px; font-weight: 600; letter-spacing: -0.01em; }
  .ws { margin-top: 6px; font-size: 13px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div>
    <div class="label">--font-sans · Geist</div>
    <div class="glyphs" style="font-family:var(--font-sans)">Aa Gg 0123</div>
    <div class="ws" style="font-family:var(--font-sans)">400 · 500 · 600 · 700</div>
  </div>
  <div>
    <div class="label">--font-mono · Geist Mono</div>
    <div class="glyphs" style="font-family:var(--font-mono)">Aa Gg 0123</div>
    <div class="ws" style="font-family:var(--font-mono)">400 · 500 · 600</div>
  </div>
</body>
</html>
