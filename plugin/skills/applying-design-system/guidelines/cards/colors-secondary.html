<!-- @dsCard group="Colors" viewport="700x150" name="Secondary" subtitle="Powder, Arctic, Ocean — supporting blues & teals" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 88px; }
  .meta { padding: 10px 12px; background: var(--bg-raised); }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--powder)"></div><div class="meta"><div class="name">Powder</div><div class="hex">#caf0f8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--arctic)"></div><div class="meta"><div class="name">Arctic</div><div class="hex">#90e0ef</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ocean)"></div><div class="meta"><div class="name">Ocean</div><div class="hex">#0077b6</div></div></div>
  </div>
</body>
</html>
