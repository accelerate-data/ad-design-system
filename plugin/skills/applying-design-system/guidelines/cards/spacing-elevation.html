<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Minimal, navy-tinted shadows — raised / floating / overlay" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-surface); padding: 28px; }
  .row { display: flex; gap: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 110px; height: 70px; background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); }
  .n { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-raised)"></div><div class="n">raised</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-floating)"></div><div class="n">floating</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-overlay)"></div><div class="n">overlay</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--glow-pacific)"></div><div class="n">glow·pacific</div></div>
  </div>
</body>
</html>
