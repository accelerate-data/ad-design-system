<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); display: grid; grid-template-columns: 1fr 1fr; }
  .pane { display: flex; align-items: center; justify-content: center; height: 200px; }
  .light { background: #ffffff; }
  .dark { background: var(--smoke); }
  .pane img { height: 92px; }
</style>
</head>
<body>
  <div class="pane light"><img src="../../assets/logos/lockup-dark.svg" alt="Vibedata lockup dark"></div>
  <div class="pane dark"><img src="../../assets/logos/lockup-light.svg" alt="Vibedata lockup light"></div>
</body>
</html>
