<!-- @dsCard group="Colors" viewport="700x150" name="Primary Brand" subtitle="Pacific (dominant), Navy (sub-dominant), Seafoam (accent)" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 88px; }
  .meta { padding: 10px 12px; background: var(--bg-raised); }
  .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .role { display: inline-block; font-size: 9px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--pacific); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--pacific)"></div><div class="meta"><div class="name">Pacific</div><div class="hex">#00b4d8</div><div class="role">Dominant</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--navy)"></div><div class="meta"><div class="name">Navy</div><div class="hex">#03045e</div><div class="role">Sub-dominant</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--seafoam)"></div><div class="meta"><div class="name">Seafoam</div><div class="hex">#00dd92</div><div class="role">Accent</div></div></div>
  </div>
</body>
</html>
